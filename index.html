<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video QR | Nombre compañía</title>
    <link rel="stylesheet" href="styles.css" />

          <p class="company">Nombre compañía</p>
          <h1 class="video-title">Titulo del video</h1>

          <div class="video-card">
            <video class="video-player" controls playsinline preload="metadata">
              <source src="VideoQR.mp4" type="video/mp4" />

            </video>
          </div>
        </div>
      </section>
